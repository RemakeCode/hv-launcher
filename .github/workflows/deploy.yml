name: CI and release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate and package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install Node dependencies
        run: npm ci

      - name: Validate pull-request commits
        if: github.event_name == 'pull_request'
        run: >-
          npm run lint:commits --
          --from "${{ github.event.pull_request.base.sha }}"
          --to "${{ github.event.pull_request.head.sha }}"

      - name: Validate pushed commits
        if: github.event_name == 'push'
        run: >-
          npm run lint:commits --
          --from "${{ github.event.before }}"
          --to "${{ github.sha }}"

      - name: Run tests
        run: task test

      - name: Run Go vet
        run: task vet

      - name: Build plugin package
        run: task package

      - name: Verify plugin package
        run: task package:verify

      - name: Upload CI package
        if: github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: hv-launcher-${{ github.sha }}
          path: package/hv-launcher.zip
          retention-days: 30
          if-no-files-found: error

  semantic-dry-run:
    name: Preview semantic release
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Preview semantic release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          dry_run: true
          extra_plugins: |
            conventional-changelog-conventionalcommits
            @semantic-release/release-notes-generator
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/github
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Prepare draft release
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-release
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Generate release token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare semantic release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extra_plugins: |
            conventional-changelog-conventionalcommits
            @semantic-release/release-notes-generator
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/github
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
