root = "."
tmp_dir = ".air"

[build]
cmd = "task dev:backend:build"
entrypoint = ["/usr/bin/true"]
include_ext = ["go", "mod", "sum"]
include_dir = ["backend"]
exclude_dir = ["backend/out"]
exclude_unchanged = true
delay = 200
stop_on_error = true

[log]
time = true

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
keep_scroll = true
